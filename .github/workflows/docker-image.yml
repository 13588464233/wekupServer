name: Build and Push

on: push

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build
        run: docker build -t ghcr.io/${{ github.repository_owner }}/wakeupserver:latest .

      - name: Push
        run: docker push ghcr.io/${{ github.repository_owner }}/wakeupserver:latest
